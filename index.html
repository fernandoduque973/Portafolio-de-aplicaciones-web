<!DOCTYPE html>
<!-- Etiqueta usada: <!DOCTYPE html>
     - Define el tipo de documento como HTML5. -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Etiqueta usada: <meta charset>
         - Especifica la codificación de caracteres como UTF-8 para soportar caracteres especiales. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Etiqueta usada: <meta name="viewport">
         - Permite que el diseño sea adaptable a diferentes tamaños de pantalla. -->
    <title>Ingreso de Clientes - Ingenia</title>
    <!-- Etiqueta usada: <title>
         - Define el título de la página que aparece en la pestaña del navegador. -->
    <link rel="stylesheet" href="style.css">
    <!-- Etiqueta usada: <link rel="stylesheet">
         - Vincula el archivo CSS externo para los estilos de la página. -->
</head>
<body>
    <header role="banner">
        <!-- Etiqueta usada: <header>
             - Representa la cabecera de la página, generalmente contiene títulos o menús. -->
        <h1>Ingenia: Registro de Clientes</h1>
        <!-- Etiqueta usada: <h1>
             - Define el encabezado principal de la página. -->
    </header>

    <main role="main">
        <!-- Etiqueta usada: <main>
             - Representa el contenido principal del documento. -->
        <section class="container">
            <!-- Etiqueta usada: <section>
                 - Define una sección del documento, en este caso, el formulario. -->
            <form action="#" class="form">
                <!-- Etiqueta usada: <form>
                     - Define un formulario para recopilar datos del usuario. -->
                <fieldset>
                    <!-- Etiqueta usada: <fieldset>
                         - Agrupa elementos relacionados dentro del formulario. -->
                    <legend>Datos Personales</legend>
                    <!-- Etiqueta usada: <legend>
                         - Proporciona un título para el contenido del fieldset. -->

                    <div class="input-box">
                        <!-- Etiqueta usada: <div>
                             - Contenedor para agrupar elementos relacionados. -->
                        <label for="cedula">Cédula</label>
                        <!-- Etiqueta usada: <label>
                             - Proporciona una descripción para el campo de entrada. -->
                        <input type="text" id="cedula" name="cedula" placeholder="Ingrese su identificación" required>
                        <!-- Etiqueta usada: <input type="text">
                             - Campo de entrada para texto, en este caso, la cédula. -->
                    </div>

                    <div class="input-box">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre y Apellido" required>
                        <!-- Etiqueta usada: <input type="text">
                             - Campo de entrada para texto, en este caso, el nombre completo. -->
                    </div>

                    <div class="input-box">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" name="direccion" placeholder="Calle, ciudad y número" required>
                        <!-- Etiqueta usada: <input type="text">
                             - Campo de entrada para texto, en este caso, la dirección. -->
                    </div>

                    <div class="input-box">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="Ej: +593 9..." required>
                        <!-- Etiqueta usada: <input type="tel">
                             - Campo de entrada para números de teléfono. -->
                    </div>

                    <div class="input-box">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" required>
                        <!-- Etiqueta usada: <input type="email">
                             - Campo de entrada para direcciones de correo electrónico. -->
                    </div>

                    <button type="submit" class="btn-submit">Guardar Cliente</button>
                    <!-- Etiqueta usada: <button>
                         - Botón para enviar los datos del formulario. -->
                </fieldset>
            </form>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 Proyecto Ingenia - Tarea Individual</p>
    </footer>
</body>
</html>
